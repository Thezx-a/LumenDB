# Prometheus scrape config for TitanKV local dev stack.
# Targets are added as services come online in later phases.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: titan-dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Storage engine (gRPC server) — Phase 2
  - job_name: titan-storage-engine
    static_configs:
      - targets: ['host.docker.internal:9091']
        labels:
          service: storage-engine

  # Go API gateway — Phase 3
  - job_name: titan-gateway
    static_configs:
      - targets: ['host.docker.internal:9092']
        labels:
          service: gateway

  # Go auth / data / meta / observability services — Phase 4
  - job_name: titan-services
    static_configs:
      - targets:
          - 'host.docker.internal:9093'
          - 'host.docker.internal:9094'
          - 'host.docker.internal:9095'
          - 'host.docker.internal:9096'

  # Raft node exporters — Phase 5
  - job_name: titan-raft
    static_configs:
      - targets: ['host.docker.internal:9097']
        labels:
          service: raft-node