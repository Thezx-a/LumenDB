# =============================================================================
# AgenticDB + DeepVector Docker Compose
# 
# 瀹屾暣鍚姩 / Full startup:
#   docker compose up -d
#
# 浠呭惎鍔?DeepVector / DeepVector only:
#   docker compose up -d lumendb
#
# 浠呭惎鍔?Agent + DeepVector (鏃犻渶 Ollama):
#   docker compose up -d lumendb agent
#
# 瀹屾暣鍚姩 (鍚?Ollama):
#   docker compose up -d
# =============================================================================
version: "3.9"

services:

  # ===========================================================================
  # DeepVector C++ 鍚戦噺鏁版嵁搴撴湇鍔?/ C++ Vector Database Service
  # ===========================================================================
  lumendb:
    build:
      context: .
      target: lumendb-runtime
    ports:
      - "8080:8080"
    volumes:
      - lumendb_data:/data
    environment:
      - DEEPVECTOR_DIM=384          # 鍚戦噺缁村害: 384 (all-MiniLM-L6-v2) 鎴?1536 (OpenAI)
      - DEEPVECTOR_PORT=8080
      - DEEPVECTOR_DATA_DIR=/data
      - DEEPVECTOR_API_KEY=${DEEPVECTOR_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "1G"

  # ===========================================================================
  # AgenticDB Python Agent 鏈嶅姟 / Python Agent Service
  # ===========================================================================
  agent:
    build:
      context: .
      target: agent-runtime
    ports:
      - "8090:8090"
    environment:
      - AGENTICDB_DEEPVECTOR_URL=http://lumendb:8080
      - AGENTICDB_AGENT_PORT=8090
      - AGENTICDB_LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - AGENTICDB_LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - AGENTICDB_EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - AGENTICDB_EMBEDDING_MODEL=all-MiniLM-L6-v2
      - AGENTICDB_OLLAMA_HOST=http://ollama:11434
      - AGENTICDB_MAX_ROUNDS=${MAX_ROUNDS:-3}
      - AGENTICDB_QUALITY_THRESHOLD=${QUALITY_THRESHOLD:-0.7}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      lumendb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "1G"

  # ===========================================================================
  # Ollama 鏈湴 LLM 鏈嶅姟 (鍙€? / Local LLM Service (optional)
  # 鍚敤鍓嶉渶瑕佸厛鎷夊彇妯″瀷: docker compose run ollama pull qwen2.5:3b
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: "8G"
    profiles:
      - full  # 榛樿涓嶅惎鍔? 浣跨敤 `docker compose --profile full up -d`

volumes:
  lumendb_data:
  ollama_data:
