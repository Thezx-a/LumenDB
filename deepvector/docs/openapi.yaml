openapi: 3.0.3
info:
  title: DeepVector HTTP API
  version: 0.1.0
  description: |
    C++ DeepVector DB (:8080). Embedding is performed by the Agent layer;
    this API accepts float32 vectors only.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /metrics:
    get:
      summary: Prometheus metrics
      responses:
        "200":
          description: text/plain Prometheus exposition
  /collections:
    get:
      summary: List collections
      responses:
        "200":
          description: collections array
    post:
      summary: Create or ensure collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        "200":
          description: collection info
  /search:
    post:
      summary: ANN search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vector]
              properties:
                vector:
                  type: array
                  items: { type: number }
                k: { type: integer, default: 10 }
                collection: { type: string, default: default }
                filter:
                  type: object
                  description: Filter AST {op, field, value, children}
      responses:
        "200":
          description: results with optional text/tags/timestamp
  /insert:
    post:
      summary: Insert vector(s) with optional metadata
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                collection: { type: string }
                vector:
                  type: array
                  items: { type: number }
                meta:
                  type: object
                  properties:
                    text: { type: string }
                    tags: { type: string }
                    timestamp: { type: integer }
                vectors:
                  type: array
                  items:
                    type: array
                    items: { type: number }
                metadatas:
                  type: array
                  items: { type: object }
      responses:
        "200":
          description: ids array
  /vectors/{id}/meta:
    get:
      summary: Fetch document metadata
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: query
          name: collection
          schema: { type: string, default: default }
      responses:
        "200":
          description: meta
        "404":
          description: not found
