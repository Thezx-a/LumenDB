version: "3.8"

services:
  lumendb:
    build:
      context: .
      dockerfile: Dockerfile
    image: lumendb:latest
    container_name: lumendb
    ports:
      - "8080:8080"
    volumes:
      - lumendb_data:/var/lib/lumendb
      - ./deepvector.json:/etc/lumendb/config.json:ro
    environment:
      - DEEPVECTOR_LOG_LEVEL=info
      - DEEPVECTOR_MAX_MEMORY=2GB
    command: ["--config", "/etc/lumendb/config.json"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      lumendb:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  lumendb_data:
  prometheus_data:
  grafana_data:
