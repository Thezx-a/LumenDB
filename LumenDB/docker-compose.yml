# =============================================================================
# AgenticDB + LumenDB Docker Compose
# 
# 完整启动 / Full startup:
#   docker compose up -d
#
# 仅启动 LumenDB / LumenDB only:
#   docker compose up -d lumendb
#
# 仅启动 Agent + LumenDB (无需 Ollama):
#   docker compose up -d lumendb agent
#
# 完整启动 (含 Ollama):
#   docker compose up -d
# =============================================================================
version: "3.9"

services:

  # ===========================================================================
  # LumenDB C++ 向量数据库服务 / C++ Vector Database Service
  # ===========================================================================
  lumendb:
    build:
      context: .
      target: lumendb-runtime
    ports:
      - "8080:8080"
    volumes:
      - lumendb_data:/data
    environment:
      - LUMENDB_DIM=384          # 向量维度: 384 (all-MiniLM-L6-v2) 或 1536 (OpenAI)
      - LUMENDB_PORT=8080
      - LUMENDB_DATA_DIR=/data
      - LUMENDB_API_KEY=${LUMENDB_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "1G"

  # ===========================================================================
  # AgenticDB Python Agent 服务 / Python Agent Service
  # ===========================================================================
  agent:
    build:
      context: .
      target: agent-runtime
    ports:
      - "8090:8090"
    environment:
      - AGENTICDB_LUMENDB_URL=http://lumendb:8080
      - AGENTICDB_AGENT_PORT=8090
      - AGENTICDB_LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - AGENTICDB_LLM_MODEL=${LLM_MODEL:-qwen2.5:3b}
      - AGENTICDB_EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - AGENTICDB_EMBEDDING_MODEL=all-MiniLM-L6-v2
      - AGENTICDB_OLLAMA_HOST=http://ollama:11434
      - AGENTICDB_MAX_ROUNDS=${MAX_ROUNDS:-3}
      - AGENTICDB_QUALITY_THRESHOLD=${QUALITY_THRESHOLD:-0.7}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      lumendb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "4G"
        reservations:
          cpus: "1"
          memory: "1G"

  # ===========================================================================
  # Ollama 本地 LLM 服务 (可选) / Local LLM Service (optional)
  # 启用前需要先拉取模型: docker compose run ollama pull qwen2.5:3b
  # ===========================================================================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          memory: "8G"
    profiles:
      - full  # 默认不启动, 使用 `docker compose --profile full up -d`

volumes:
  lumendb_data:
  ollama_data:
