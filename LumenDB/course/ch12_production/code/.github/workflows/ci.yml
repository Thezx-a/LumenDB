name: LumenDB CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: Build ${{ matrix.os }} gcc-${{ matrix.gcc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        gcc: [12, 13]
        exclude:
          - os: ubuntu-22.04
            gcc: 13

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-${{ matrix.gcc }} cmake

      - name: Cache build
        uses: actions/cache@v3
        with:
          path: build/
          key: ${{ runner.os }}-gcc${{ matrix.gcc }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_CXX_COMPILER=g++-${{ matrix.gcc }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Unit tests
        run: cd build && ctest --output-on-failure -j$(nproc)

  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          sudo apt-get install -y clang-format-16
          find . -name '*.cpp' -o -name '*.h' | xargs clang-format-16 --dry-run --Werror

  docker:
    needs: [build-and-test, lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/lumendb:latest
            ${{ secrets.DOCKER_USERNAME }}/lumendb:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
