name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------
  # C++ — Storage engine (MiniKV), network lib (SkyNet), legacy C++ server
  # -----------------------------------------------------------------
  cpp:
    name: C++ (${{ matrix.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: TitanKV (top-level)
            dir: .
            configure-args: "-DENABLE_TESTS=ON"
          - name: MiniKV (standalone)
            dir: minikv
            configure-args: "-DENABLE_TESTS=ON"
          - name: SkyNet (standalone)
            dir: skynet
            configure-args: "-DENABLE_TESTS=ON"
          - name: DeepVector server (legacy, pending refactor)
            dir: deepvector
            configure-args: "-DENABLE_TESTS=ON"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++-12 cmake ninja-build
      - name: Configure
        working-directory: ${{ matrix.dir }}
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.configure-args }} -DCMAKE_CXX_COMPILER=g++-12
      - name: Build
        working-directory: ${{ matrix.dir }}
        run: cmake --build build -j$(nproc)
      - name: Test
        working-directory: ${{ matrix.dir }}
        run: ctest --test-dir build --output-on-failure

  # -----------------------------------------------------------------
  # Go — currently empty (services added in Phase 3+)
  # -----------------------------------------------------------------
  go:
    name: Go modules
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (race)
        run: go test -race -count=1 ./... || true