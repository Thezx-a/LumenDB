services:
  deepvector:
    build:
      context: .
      dockerfile: deepvector/Dockerfile
      target: deepvector-runtime
    ports:
      - "8080:8080"
    volumes:
      - deepvector_data:/data

  agent:
    build:
      context: .
      dockerfile: deepvector/Dockerfile
      target: agent-runtime
    ports:
      - "8090:8090"
    environment:
      AGENTICDB_DEEPVECTOR_URL: http://deepvector:8080
      AGENTICDB_LLM_PROVIDER: ollama
      AGENTICDB_OLLAMA_HOST: http://host.docker.internal:11434
    depends_on:
      - deepvector

volumes:
  deepvector_data:
